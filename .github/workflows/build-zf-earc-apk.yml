name: Build zf.earc.top patched APK

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/build-zf-earc-apk.yml"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.14.4"

      - name: Patch Vmq App for zf.earc.top
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          main_path = Path("app/src/main/java/com/shinian/pay/ui/MainActivity.java")
          service_path = Path("app/src/main/java/com/shinian/pay/service/PayNotificationListenerService.java")
          manifest_path = Path("app/src/main/AndroidManifest.xml")

          main = main_path.read_text()
          service = service_path.read_text()
          manifest = manifest_path.read_text()

          def replace_method(src, signature, new_method):
              start = src.find(signature)
              if start == -1:
                  raise SystemExit("找不到方法：" + signature)

              brace_start = src.find("{", start)
              if brace_start == -1:
                  raise SystemExit("找不到方法左括号：" + signature)

              depth = 0
              end = None
              for i in range(brace_start, len(src)):
                  if src[i] == "{":
                      depth += 1
                  elif src[i] == "}":
                      depth -= 1
                      if depth == 0:
                          end = i + 1
                          break

              if end is None:
                  raise SystemExit("找不到方法右括号：" + signature)

              return src[:start] + new_method + src[end:]

          # 允许 HTTP 备用；zf.earc.top 默认 HTTPS
          if 'android:usesCleartextTraffic="true"' not in manifest:
              manifest = manifest.replace(
                  '<application',
                  '<application\n            android:usesCleartextTraffic="true"',
                  1
              )

          # appHeart 改 HTTPS
          main = main.replace(
              '"http://" + tmp[0] + "/appHeart?t=" + t + "&sign=" + sign',
              '"https://" + tmp[0] + "/appHeart?t=" + t + "&sign=" + sign'
          )
          main = main.replace(
              '"http://" + host + "/appHeart?t=" + t + "&sign=" + sign',
              '"https://" + host + "/appHeart?t=" + t + "&sign=" + sign'
          )
          service = service.replace(
              '"http://" + host + "/appHeart?t=" + t + "&sign=" + sign',
              '"https://" + host + "/appHeart?t=" + t + "&sign=" + sign'
          )

          # 后台打开改 HTTPS
          main = main.replace(
              'Uri.parse("http://" + Url)',
              'Uri.parse("https://" + Url)'
          )

          # 清理旧补丁残留：不传 transMemo，不禁用系统代理
          service = service.replace('appPush(platformType, amount, title + " " + content);', 'appPush(platformType, amount);')
          service = service.replace('appPush(1, amount, title + " " + content);', 'appPush(1, amount);')
          service = service.replace('public void appPush(final int type, final double price, final String transMemo) {', 'public void appPush(final int type, final double price) {')
          service = service.replace('String memo = transMemo == null ? "" : transMemo;', '')
          service = service.replace('String sign = md5(type + priceStr + t + memo + key);', 'String sign = md5(type + priceStr + t + key);')
          service = service.replace('String url = buildPushUrl(host, type, priceStr, t, memo, sign);', 'String url = buildPushUrl(host, type, priceStr, t, sign);')
          service = service.replace('scheduleRetryCallback(type, price, priceStr, memo);', 'scheduleRetryCallback(type, price, priceStr);')
          service = service.replace('private void scheduleRetryCallback(final int type, final double price, final String priceStr, final String memo) {', 'private void scheduleRetryCallback(final int type, final double price, final String priceStr) {')
          service = service.replace('.proxy(Proxy.NO_PROXY)\n                    ', '')
          main = main.replace('.proxy(Proxy.NO_PROXY)', '')
          service = service.replace('import java.net.Proxy;\n', '')
          main = main.replace('import java.net.Proxy;\n', '')
          service = service.replace('url.openConnection(Proxy.NO_PROXY)', 'url.openConnection()')

          # 原始通知日志
          old_log = 'Log.d(TAG, "包名: " + pkg);'
          new_log = '''Log.d(TAG, "收到通知 包名:" + pkg + " 标题:" + title + " 内容:" + content);
                  if (PACKAGE_ALIPAY.equals(pkg) || PACKAGE_WECHAT.equals(pkg) || PACKAGE_WECHAT_WORK.equals(pkg)) {
                      if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.N) {
                          sendMonitorLogs(new SimpleDateFormat("yyyy-MM-dd HH:mm:ss").format(new Date())
                                  + "\\r\\r\\r\\r" + "收到原始通知 | 包名：" + pkg + " | 标题：" + title + " | 内容：" + content);
                      }
                  }'''
          if old_log in service:
              service = service.replace(old_log, new_log, 1)

          # 金额识别：只识别 数字+元 / ￥数字 / ¥数字，避免 [2条] 被识别为金额
          new_get_money = '''public static String getMoney(String content) {
                  if (content == null || content.isEmpty()) return null;

                  String text = content
                          .replace("，", ",")
                          .replace("。", ".")
                          .replace("（", "(")
                          .replace("）", ")");

                  java.util.regex.Pattern yuanAfter =
                          java.util.regex.Pattern.compile("(?<![0-9])([0-9]+(?:\\\\.[0-9]{1,2})?)\\\\s*元");
                  java.util.regex.Matcher matcher = yuanAfter.matcher(text);
                  while (matcher.find()) {
                      String matched = matcher.group(1);
                      if (isValidNumber(matched)) {
                          try {
                              double amount = Double.parseDouble(matched);
                              if (amount >= 0.01 && amount <= 999999.99) {
                                  return matched;
                              }
                          } catch (NumberFormatException e) {
                              Log.w(TAG, "getMoney: 无效金额：" + matched);
                          }
                      }
                  }

                  java.util.regex.Pattern moneySymbol =
                          java.util.regex.Pattern.compile("[¥￥]\\\\s*([0-9]+(?:\\\\.[0-9]{1,2})?)");
                  matcher = moneySymbol.matcher(text);
                  while (matcher.find()) {
                      String matched = matcher.group(1);
                      if (isValidNumber(matched)) {
                          try {
                              double amount = Double.parseDouble(matched);
                              if (amount >= 0.01 && amount <= 999999.99) {
                                  return matched;
                              }
                          } catch (NumberFormatException e) {
                              Log.w(TAG, "getMoney: 无效金额：" + matched);
                          }
                      }
                  }

                  return null;
              }'''
          service = replace_method(service, 'public static String getMoney(String content) {', new_get_money)

          # 支付宝识别：先确认是支付宝收款通知，再识别 数字+元
          new_alipay = '''private void handleAlipayNotification(String title, String content) {
                  if (TextUtils.isEmpty(title) && TextUtils.isEmpty(content)) {
                      return;
                  }

                  String rawText = (title == null ? "" : title) + " " + (content == null ? "" : content);

                  boolean isAlipayPay =
                          rawText.contains("成功收款") ||
                          rawText.contains("支付宝成功收款") ||
                          rawText.contains("通过扫码向你付款") ||
                          rawText.contains("店员通") ||
                          rawText.contains("收钱码到账") ||
                          rawText.contains("收款到账") ||
                          rawText.contains("老顾客消费") ||
                          rawText.contains("已转入余额") ||
                          rawText.contains("余额宝");

                  if (!isAlipayPay) {
                      return;
                  }

                  if (rawText.contains("退款") ||
                      rawText.contains("失败") ||
                      rawText.contains("广告") ||
                      rawText.contains("活动提醒") ||
                      rawText.contains("申请提醒")) {
                      return;
                  }

                  String money = getMoney(title);
                  if (money == null || money.isEmpty()) {
                      money = getMoney(content);
                  }

                  if (money != null && !money.isEmpty()) {
                      try {
                          double amount = Double.parseDouble(money);
                          Toast.makeText(this, "匹配成功：支付宝到账" + money + "元", Toast.LENGTH_LONG).show();

                          if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.N) {
                              sendMonitorLogs(new SimpleDateFormat("yyyy-MM-dd HH:mm:ss").format(new Date())
                                      + "\\r\\r\\r\\r"
                                      + "匹配支付宝收款成功 | 金额：" + money
                                      + " | 标题：" + title
                                      + " | 内容：" + content);
                          }

                          appPush(2, amount);
                      } catch (NumberFormatException e) {
                          Log.e(TAG, "解析支付宝金额失败：" + money, e);
                          showMoneyParseErrorToast("支付宝");
                      }
                  } else {
                      if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.N) {
                          sendMonitorLogs(new SimpleDateFormat("yyyy-MM-dd HH:mm:ss").format(new Date())
                                  + "\\r\\r\\r\\r"
                                  + "收到支付宝收款通知，但未识别到金额 | 标题：" + title
                                  + " | 内容：" + content);
                      }
                      showMoneyParseErrorToast("支付宝");
                  }
              }'''
          service = replace_method(service, 'private void handleAlipayNotification(String title, String content) {', new_alipay)

          # 微信识别：必须先确认是微信收款助手/微信支付收款类通知，避免好友消息误判
          new_wechat = '''private void handleWechatNotification(String title, String content) {
                  if (TextUtils.isEmpty(title) && TextUtils.isEmpty(content)) return;

                  String rawText = (title == null ? "" : title) + " " + (content == null ? "" : content);

                  boolean fromWechatPayAssistant = false;
                  for (String payTitle : WECHAT_PAY_TITLES) {
                      if (payTitle.equals(title) || rawText.contains(payTitle)) {
                          fromWechatPayAssistant = true;
                          break;
                      }
                  }

                  if (!fromWechatPayAssistant) {
                      fromWechatPayAssistant =
                              "微信收款助手".equals(title) ||
                              "微信支付".equals(title) ||
                              rawText.contains("微信收款助手：") ||
                              rawText.contains("微信支付收款") ||
                              rawText.contains("微信收款商业版") ||
                              rawText.contains("二维码收款") ||
                              rawText.contains("收款到账");
                  }

                  if (!fromWechatPayAssistant) {
                      return;
                  }

                  if (rawText.contains("已支付") ||
                      rawText.contains("付款成功") ||
                      rawText.contains("收款失败") ||
                      rawText.contains("失败通知") ||
                      rawText.contains("申请提醒") ||
                      rawText.contains("收款码牌") ||
                      rawText.contains("码牌套包") ||
                      rawText.contains("朋友消息") ||
                      rawText.contains("群聊")) {
                      return;
                  }

                  String money = getMoney(content);
                  if (money == null || money.isEmpty()) {
                      money = getMoney(title);
                  }

                  if (money != null && !money.isEmpty()) {
                      try {
                          double amount = Double.parseDouble(money);
                          Toast.makeText(this, "匹配成功：微信到账" + money + "元", Toast.LENGTH_LONG).show();

                          if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.N) {
                              sendMonitorLogs(new SimpleDateFormat("yyyy-MM-dd HH:mm:ss").format(new Date())
                                      + "\\r\\r\\r\\r"
                                      + "匹配微信收款成功 | 金额：" + money
                                      + " | 标题：" + title
                                      + " | 内容：" + content);
                          }

                          appPush(1, amount);
                      } catch (NumberFormatException e) {
                          Log.e(TAG, "解析微信金额失败：" + money, e);
                          showMoneyParseErrorToast("微信");
                      }
                  } else {
                      if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.N) {
                          sendMonitorLogs(new SimpleDateFormat("yyyy-MM-dd HH:mm:ss").format(new Date())
                                  + "\\r\\r\\r\\r"
                                  + "收到微信收款通知，但未识别到金额 | 标题：" + title
                                  + " | 内容：" + content);
                      }
                      showMoneyParseErrorToast("微信");
                  }
              }'''
          service = replace_method(service, 'private void handleWechatNotification(String title, String content) {', new_wechat)

          # 强制 appPush HTTPS，不带 transMemo
          new_build_url = '''private String buildPushUrl(String host, int type, String priceStr, String t, String sign) {
                  return "https://" +
                          host +
                          "/appPush?t=" +
                          t +
                          "&type=" +
                          type +
                          "&price=" +
                          priceStr +
                          "&sign=" +
                          sign;
              }'''
          service = replace_method(service, 'private String buildPushUrl(String host, int type, String priceStr, String t, String sign) {', new_build_url)

          main_path.write_text(main)
          service_path.write_text(service)
          manifest_path.write_text(manifest)

          print("Patch finished: safer WeChat/Alipay recognition, amount+元 only, HTTPS appPush, no transMemo.")
          PY

      - name: Build debug APK
        run: gradle assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Vmq-App-zf-earc-debug-apk
          path: app/build/outputs/apk/debug/*.apk
