name: Build zf.earc.top patched APK

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Apply zf.earc.top compatibility patch
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import sys

          root = Path.cwd()
          main = root / 'app/src/main/java/com/shinian/pay/ui/MainActivity.java'
          service = root / 'app/src/main/java/com/shinian/pay/service/PayNotificationListenerService.java'
          util_dir = root / 'app/src/main/java/com/shinian/pay/util'
          network = util_dir / 'NetworkCompat.java'

          if not main.exists() or not service.exists():
              print('ERROR: expected Vmq-App project structure not found')
              sys.exit(1)

          util_dir.mkdir(parents=True, exist_ok=True)
          network.write_text(r'''package com.shinian.pay.util;

import android.text.TextUtils;

import java.net.Proxy;
import java.net.URI;
import java.net.URLEncoder;
import java.nio.charset.StandardCharsets;
import java.util.Locale;
import java.util.concurrent.TimeUnit;

import okhttp3.OkHttpClient;

public final class NetworkCompat {
    private NetworkCompat() {}

    public static final boolean DEFAULT_PUBLIC_HTTPS = true;
    public static final boolean BYPASS_SYSTEM_PROXY = true;

    public static final class Config {
        public final String host;
        public final String key;
        public final String scheme;
        public final String baseUrl;

        private Config(String host, String key, String scheme) {
            this.host = host;
            this.key = key;
            this.scheme = scheme;
            this.baseUrl = scheme + "://" + host;
        }
    }

    public static OkHttpClient newClient() {
        OkHttpClient.Builder builder = new OkHttpClient.Builder()
                .connectTimeout(12, TimeUnit.SECONDS)
                .readTimeout(20, TimeUnit.SECONDS)
                .writeTimeout(12, TimeUnit.SECONDS)
                .retryOnConnectionFailure(true);
        if (BYPASS_SYSTEM_PROXY) {
            builder.proxy(Proxy.NO_PROXY);
        }
        return builder.build();
    }

    public static Config parseConfig(String raw) {
        if (TextUtils.isEmpty(raw)) return null;
        String s = raw.trim().replace("\n", "").replace("\r", "").replace(" ", "");
        if (s.length() == 0) return null;

        String scheme = null;
        String host;
        String key;
        try {
            if (s.startsWith("http://") || s.startsWith("https://")) {
                URI uri = URI.create(s);
                scheme = uri.getScheme();
                host = uri.getHost();
                if (host == null || host.length() == 0) return null;
                if (uri.getPort() > 0) host = host + ":" + uri.getPort();
                String path = uri.getPath();
                if (TextUtils.isEmpty(path) || path.equals("/")) return null;
                int lastSlash = path.lastIndexOf('/');
                key = path.substring(lastSlash + 1);
            } else {
                int idx = s.lastIndexOf('/');
                if (idx <= 0 || idx >= s.length() - 1) return null;
                host = s.substring(0, idx);
                key = s.substring(idx + 1);
            }
        } catch (Exception e) {
            return null;
        }

        host = cleanHost(host);
        key = key == null ? "" : key.trim();
        if (TextUtils.isEmpty(host) || TextUtils.isEmpty(key)) return null;
        if (TextUtils.isEmpty(scheme)) scheme = chooseScheme(host);
        return new Config(host, key, scheme);
    }

    public static String buildHeartUrl(String host, String t, String sign) {
        return normalizeBaseUrl(host) + "/appHeart?t=" + enc(t) + "&sign=" + enc(sign);
    }

    public static String buildPushUrl(String host, int type, String price, String t, String transMemo, String sign) {
        String memo = transMemo == null ? "" : transMemo;
        return normalizeBaseUrl(host)
                + "/appPush?t=" + enc(t)
                + "&type=" + type
                + "&price=" + enc(price)
                + "&transMemo=" + enc(memo)
                + "&sign=" + enc(sign);
    }

    public static String normalizeBaseUrl(String rawHost) {
        if (rawHost == null) rawHost = "";
        rawHost = rawHost.trim();
        if (rawHost.startsWith("http://") || rawHost.startsWith("https://")) {
            try {
                URI uri = URI.create(rawHost);
                String h = uri.getHost();
                if (h != null && h.length() > 0) {
                    if (uri.getPort() > 0) h = h + ":" + uri.getPort();
                    return uri.getScheme() + "://" + h;
                }
            } catch (Exception ignored) {}
        }
        String host = cleanHost(rawHost);
        return chooseScheme(host) + "://" + host;
    }

    private static String cleanHost(String host) {
        if (host == null) return "";
        host = host.trim();
        host = host.replaceFirst("^https?://", "");
        int slash = host.indexOf('/');
        if (slash >= 0) host = host.substring(0, slash);
        while (host.endsWith("/")) host = host.substring(0, host.length() - 1);
        return host;
    }

    private static String chooseScheme(String host) {
        String h = host == null ? "" : host.toLowerCase(Locale.ROOT);
        if (h.startsWith("localhost") || h.startsWith("127.") || h.startsWith("10.")
                || h.startsWith("192.168.") || h.matches("172\\.(1[6-9]|2[0-9]|3[0-1])\\..*")) {
            return "http";
        }
        return DEFAULT_PUBLIC_HTTPS ? "https" : "http";
    }

    private static String enc(String s) {
        try {
            return URLEncoder.encode(s == null ? "" : s, StandardCharsets.UTF_8.name());
        } catch (Exception e) {
            return s == null ? "" : s;
        }
    }
}
''', encoding='utf-8')

