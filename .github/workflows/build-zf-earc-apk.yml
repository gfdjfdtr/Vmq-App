name: Build zf.earc.top patched APK

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/build-zf-earc-apk.yml"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.14.4"

      - name: Patch source for zf.earc.top and notification debug
        run: |
          python3 <<'PY'
          from pathlib import Path
          import re

          main_path = Path("app/src/main/java/com/shinian/pay/ui/MainActivity.java")
          service_path = Path("app/src/main/java/com/shinian/pay/service/PayNotificationListenerService.java")
          manifest_path = Path("app/src/main/AndroidManifest.xml")

          main = main_path.read_text()
          service = service_path.read_text()
          manifest = manifest_path.read_text()

          # AndroidManifest 允许明文 HTTP，备用兼容
          if 'android:usesCleartextTraffic="true"' not in manifest:
              manifest = manifest.replace(
                  '<application',
                  '<application\n            android:usesCleartextTraffic="true"',
                  1
              )

          # MainActivity 增加 Proxy 导入
          if "import java.net.Proxy;" not in main:
              main = main.replace(
                  "import java.net.HttpURLConnection;",
                  "import java.net.HttpURLConnection;\nimport java.net.Proxy;"
              )

          # Service 增加 Proxy 导入
          if "import java.net.Proxy;" not in service:
              service = service.replace(
                  "import java.net.HttpURLConnection;",
                  "import java.net.HttpURLConnection;\nimport java.net.Proxy;"
              )

          # MainActivity OkHttpClient 不走系统代理，避免 CONNECT / 异常
          main = main.replace(
              "OkHttpClient okHttpClient = new OkHttpClient();",
              "OkHttpClient okHttpClient = new OkHttpClient.Builder().proxy(Proxy.NO_PROXY).build();"
          )

          # MainActivity 心跳接口改 HTTPS
          main = main.replace(
              '"http://" + tmp[0] + "/appHeart?t=" + t + "&sign=" + sign',
              '"https://" + tmp[0] + "/appHeart?t=" + t + "&sign=" + sign'
          )
          main = main.replace(
              '"http://" + host + "/appHeart?t=" + t + "&sign=" + sign',
              '"https://" + host + "/appHeart?t=" + t + "&sign=" + sign'
          )

          # 后台打开也改 HTTPS
          main = main.replace(
              'Uri.parse("http://" + Url)',
              'Uri.parse("https://" + Url)'
          )

          # Service OkHttpClient 不走系统代理
          service = service.replace(
              "new OkHttpClient.Builder()\n                    .connectTimeout(10, java.util.concurrent.TimeUnit.SECONDS)",
              "new OkHttpClient.Builder()\n                    .proxy(Proxy.NO_PROXY)\n                    .connectTimeout(10, java.util.concurrent.TimeUnit.SECONDS)"
          )

          # Service 心跳接口改 HTTPS
          service = service.replace(
              '"http://" + host + "/appHeart?t=" + t + "&sign=" + sign',
              '"https://" + host + "/appHeart?t=" + t + "&sign=" + sign'
          )

          # 收到微信/支付宝/企业微信通知时，把原始通知写到 App 日志
          old_log = 'Log.d(TAG, "包名: " + pkg);'
          new_log = '''Log.d(TAG, "收到通知 包名:" + pkg + " 标题:" + title + " 内容:" + content);
                  if (PACKAGE_ALIPAY.equals(pkg) || PACKAGE_WECHAT.equals(pkg) || PACKAGE_WECHAT_WORK.equals(pkg)) {
                      if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.N) {
                          sendMonitorLogs(new SimpleDateFormat("yyyy-MM-dd HH:mm:ss").format(new Date())
                                  + "\\r\\r\\r\\r" + "收到原始通知 | 包名：" + pkg + " | 标题：" + title + " | 内容：" + content);
                      }
                  }'''
          if old_log in service:
              service = service.replace(old_log, new_log, 1)

          # 放宽金额提取：不再强制必须包含“收款”
          service = service.replace(
              '''int shoukuanIndex = content.indexOf("收款");
                  if (shoukuanIndex < 0) return null;

                  String afterShoukuan = content.substring(shoukuanIndex);''',
              '''String afterShoukuan = content;'''
          )

          # 放宽支付宝识别逻辑
          service = re.sub(
              r'boolean isNormalPay = \(title\.contains\("成功收款"\) && content\.contains\("已转入余额"\)\) \n\s*\|\| content\.contains\("通过扫码向你付款"\);\n\s*boolean isStaffPay = title\.contains\("店员通"\) \|\| content\.contains\("支付宝成功收款"\);',
              '''String rawText = (title == null ? "" : title) + " " + (content == null ? "" : content);
                  boolean isNormalPay = rawText.contains("成功收款") || rawText.contains("收款") || rawText.contains("到账") || rawText.contains("付款") || rawText.contains("转账") || rawText.contains("已转入") || rawText.contains("扫码");
                  boolean isStaffPay = rawText.contains("店员通") || rawText.contains("支付宝成功收款");''',
              service,
              count=1
          )

          # 放宽微信识别逻辑
          service = service.replace(
              'if (!isPayTitle) return;',
              '''String rawText = (title == null ? "" : title) + " " + (content == null ? "" : content);
                  if (!isPayTitle && !rawText.contains("收款") && !rawText.contains("到账") && !rawText.contains("付款") && !rawText.contains("转账") && !rawText.contains("收钱")) return;'''
          )

          service = service.replace(
              'if (!content.contains("收款") || content.contains("已支付")) return;',
              '''if (!(rawText.contains("收款") || rawText.contains("到账") || rawText.contains("付款") || rawText.contains("转账") || rawText.contains("收钱")) || rawText.contains("已支付")) return;'''
          )

          # appPush 调用增加 transMemo
          service = service.replace(
              "appPush(platformType, amount);",
              "appPush(platformType, amount, title + \" \" + content);"
          )
          service = service.replace(
              "appPush(1, amount);",
              "appPush(1, amount, title + \" \" + content);"
          )

          # appPush 方法增加 transMemo 参数
          service = service.replace(
              "public void appPush(final int type, final double price) {",
              "public void appPush(final int type, final double price, final String transMemo) {"
          )

          # appPush 内增加 memo 变量
          service = service.replace(
              'String priceStr = String.format("%.2f", price);',
              'String priceStr = String.format("%.2f", price);\n        String memo = transMemo == null ? "" : transMemo;',
              1
          )

          # appPush 签名改成 md5(type + price + t + transMemo + key)
          service = service.replace(
              "String sign = md5(type + priceStr + t + key);",
              "String sign = md5(type + priceStr + t + memo + key);"
          )

          service = service.replace(
              "String url = buildPushUrl(host, type, priceStr, t, sign);",
              "String url = buildPushUrl(host, type, priceStr, t, memo, sign);"
          )

          service = service.replace(
              "scheduleRetryCallback(type, price, priceStr);",
              "scheduleRetryCallback(type, price, priceStr, memo);"
          )

          # 替换 buildPushUrl，增加 transMemo，并使用 HTTPS
          service = re.sub(
              r'    private String buildPushUrl\(String host, int type, String priceStr, String t, String sign\) \{[\s\S]*?    \}\n        \n    /\*\*\n     \* 记录推送结果日志',
              '''    private String encodeUrl(String value) {
                  try {
                      return java.net.URLEncoder.encode(value == null ? "" : value, "UTF-8");
                  } catch (Exception e) {
                      return "";
                  }
              }

              private String buildPushUrl(String host, int type, String priceStr, String t, String transMemo, String sign) {
                  return "https://" +
                          host +
                          "/appPush?t=" +
                          t +
                          "&type=" +
                          type +
                          "&price=" +
                          priceStr +
                          "&transMemo=" +
                          encodeUrl(transMemo) +
                          "&sign=" +
                          sign;
              }
                  
              /**
               * 记录推送结果日志''',
              service,
              count=1
          )

          # 补回调也带 memo
          service = service.replace(
              "private void scheduleRetryCallback(final int type, final double price, final String priceStr) {",
              "private void scheduleRetryCallback(final int type, final double price, final String priceStr, final String memo) {"
          )

          service = service.replace(
              "String url = buildPushUrl(host, type, priceStr, t, sign);",
              "String url = buildPushUrl(host, type, priceStr, t, memo, sign);"
          )

          # getHtml 不走系统代理
          service = service.replace(
              "conn = (HttpURLConnection) url.openConnection();",
              "conn = (HttpURLConnection) url.openConnection(Proxy.NO_PROXY);"
          )

          main_path.write_text(main)
          service_path.write_text(service)
          manifest_path.write_text(manifest)

          print("Patch finished: notification debug + HTTPS appPush + transMemo sign.")
          PY

      - name: Build debug APK
        run: gradle assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Vmq-App-zf-earc-debug-apk
          path: app/build/outputs/apk/debug/*.apk
