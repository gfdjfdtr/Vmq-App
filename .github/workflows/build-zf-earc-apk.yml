name: Build zf.earc.top patched APK

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/build-zf-earc-apk.yml"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.14.4"

      - name: Patch source for stable Vmq callback with system proxy
        run: |
          python3 <<'PY'
          from pathlib import Path

          main_path = Path("app/src/main/java/com/shinian/pay/ui/MainActivity.java")
          service_path = Path("app/src/main/java/com/shinian/pay/service/PayNotificationListenerService.java")
          manifest_path = Path("app/src/main/AndroidManifest.xml")

          main = main_path.read_text()
          service = service_path.read_text()
          manifest = manifest_path.read_text()

          # 1. 允许明文 HTTP，备用兼容；公网请求仍默认改 HTTPS
          if 'android:usesCleartextTraffic="true"' not in manifest:
              manifest = manifest.replace(
                  '<application',
                  '<application\n            android:usesCleartextTraffic="true"',
                  1
              )

          # 2. MainActivity 心跳改 HTTPS
          main = main.replace(
              '"http://" + tmp[0] + "/appHeart?t=" + t + "&sign=" + sign',
              '"https://" + tmp[0] + "/appHeart?t=" + t + "&sign=" + sign'
          )
          main = main.replace(
              '"http://" + host + "/appHeart?t=" + t + "&sign=" + sign',
              '"https://" + host + "/appHeart?t=" + t + "&sign=" + sign'
          )

          # 3. 后台打开也改 HTTPS
          main = main.replace(
              'Uri.parse("http://" + Url)',
              'Uri.parse("https://" + Url)'
          )

          # 4. Service 心跳改 HTTPS
          service = service.replace(
              '"http://" + host + "/appHeart?t=" + t + "&sign=" + sign',
              '"https://" + host + "/appHeart?t=" + t + "&sign=" + sign'
          )

          # 5. 收到微信/支付宝/企业微信通知时，把原始通知显示在 App 日志里
          old_log = 'Log.d(TAG, "包名: " + pkg);'
          new_log = '''Log.d(TAG, "收到通知 包名:" + pkg + " 标题:" + title + " 内容:" + content);
                  if (PACKAGE_ALIPAY.equals(pkg) || PACKAGE_WECHAT.equals(pkg) || PACKAGE_WECHAT_WORK.equals(pkg)) {
                      if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.N) {
                          sendMonitorLogs(new SimpleDateFormat("yyyy-MM-dd HH:mm:ss").format(new Date())
                                  + "\\r\\r\\r\\r" + "收到原始通知 | 包名：" + pkg + " | 标题：" + title + " | 内容：" + content);
                      }
                  }'''
          if old_log in service:
              service = service.replace(old_log, new_log, 1)

          # 6. 放宽金额提取：不再强制必须包含“收款”
          service = service.replace(
              '''int shoukuanIndex = content.indexOf("收款");
          if (shoukuanIndex < 0) return null;

          String afterShoukuan = content.substring(shoukuanIndex);''',
              '''String afterShoukuan = content;'''
          )

          # 7. 放宽支付宝通知识别
          old_alipay = '''boolean isNormalPay = (title.contains("成功收款") && content.contains("已转入余额")) 
                             || content.contains("通过扫码向你付款");
        boolean isStaffPay = title.contains("店员通") || content.contains("支付宝成功收款");'''

          new_alipay = '''String rawTextAlipay = (title == null ? "" : title) + " " + (content == null ? "" : content);
        boolean isNormalPay = rawTextAlipay.contains("成功收款") || rawTextAlipay.contains("收款") || rawTextAlipay.contains("到账") || rawTextAlipay.contains("付款") || rawTextAlipay.contains("转账") || rawTextAlipay.contains("已转入") || rawTextAlipay.contains("扫码");
        boolean isStaffPay = rawTextAlipay.contains("店员通") || rawTextAlipay.contains("支付宝成功收款");'''

          if old_alipay in service:
              service = service.replace(old_alipay, new_alipay, 1)

          # 8. 放宽微信通知识别
          service = service.replace(
              'if (!isPayTitle) return;',
              '''String rawTextWechat = (title == null ? "" : title) + " " + (content == null ? "" : content);
        if (!isPayTitle && !rawTextWechat.contains("收款") && !rawTextWechat.contains("到账") && !rawTextWechat.contains("付款") && !rawTextWechat.contains("转账") && !rawTextWechat.contains("收钱")) return;'''
          )

          service = service.replace(
              'if (!content.contains("收款") || content.contains("已支付")) return;',
              '''if (!(rawTextWechat.contains("收款") || rawTextWechat.contains("到账") || rawTextWechat.contains("付款") || rawTextWechat.contains("转账") || rawTextWechat.contains("收钱")) || rawTextWechat.contains("已支付")) return;'''
          )

          # 9. appPush 回调改 HTTPS，但保持原版参数：type、price、t、sign
          # 不传 transMemo，避免你的 PHP 服务端把 transMemo 当订单 id 查询
          service = service.replace(
              'return "http://" +\n                host +',
              'return "https://" +\n                host +'
          )

          # 10. 回调响应写入 App 日志，方便判断网站返回什么
          service = service.replace(
              '''String str = response.body().string();
                    JSONObject result = new JSONObject(str);''',
              '''String str = response.body().string();
                    if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.N) {
                        sendMonitorLogs(new SimpleDateFormat("yyyy-MM-dd HH:mm:ss").format(new Date())
                                + "\\r\\r\\r\\r" + "回调URL：" + url + " | HTTP：" + response.code() + " | 返回：" + str);
                    }
                    JSONObject result = new JSONObject(str);''',
              1
          )

          main_path.write_text(main)
          service_path.write_text(service)
          manifest_path.write_text(manifest)

          print("Patch finished: HTTPS appHeart/appPush, system proxy enabled, no transMemo.")
          PY

      - name: Build debug APK
        run: gradle assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Vmq-App-zf-earc-debug-apk
          path: app/build/outputs/apk/debug/*.apk
